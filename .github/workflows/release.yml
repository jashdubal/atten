name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.2"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"
      - name: Select Xcode 16
        run: |
          XCODE="$(ls -d /Applications/Xcode_16*.app | tail -1)"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          swift --version

      - name: Validate runner and release version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          test "$(uname -m)" = "arm64"
          VERSION="${TAG#v}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macOS/Info.plist)"
          test "$VERSION" = "$PLIST_VERSION"
          test -z "$(git status --porcelain)"

      - name: Run test suites
        run: |
          swift test
          uv run python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Build fully offline macOS release
        env:
          RUN_SYNTHESIS_SMOKE: "1"
        run: scripts/build-release --version "${GITHUB_REF_NAME#v}"

      - name: Attest macOS release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            .build/release-artifacts/Atten-macOS-arm64.dmg
            .build/release-artifacts/Atten-corresponding-source.tar.gz
            .build/release-artifacts/Atten-sbom.spdx.json
            .build/release-artifacts/SHA256SUMS.txt

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          path: |
            .build/release-artifacts/Atten-macOS-arm64.dmg
            .build/release-artifacts/Atten-corresponding-source.tar.gz
            .build/release-artifacts/Atten-sbom.spdx.json
            .build/release-artifacts/SHA256SUMS.txt

  package-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.2"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: microsoft/setup-msbuild@v2

      - name: Validate release version
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $Version = $env:TAG.TrimStart("v")
          $Dirty = git status --porcelain
          if ($Dirty) {
            throw "Release builds require a clean worktree."
          }
          Write-Host "Building Atten $Version for Windows x64"

      - name: Run backend tests
        run: uv run python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build Windows preview package
        shell: pwsh
        run: scripts/build-windows.ps1 -BackendFlavor cpu

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: .build/windows-artifacts/Atten-Windows-x64.zip

  publish:
    runs-on: ubuntu-latest
    needs: [package-macos, package-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-artifacts/Atten-macOS-arm64.dmg \
            release-artifacts/Atten-Windows-x64.zip \
            release-artifacts/Atten-corresponding-source.tar.gz \
            release-artifacts/Atten-sbom.spdx.json \
            release-artifacts/SHA256SUMS.txt \
            --verify-tag \
            --title "Atten ${GITHUB_REF_NAME#v}" \
            --notes-file packaging/RELEASE_NOTES.md
