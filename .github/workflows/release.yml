name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.2"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"

      - name: Validate runner and release version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          test "$(uname -m)" = "arm64"
          VERSION="${TAG#v}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' macOS/Info.plist)"
          test "$VERSION" = "$PLIST_VERSION"
          test -z "$(git status --porcelain)"

      - name: Run test suites
        run: |
          swift test
          uv run python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Build fully offline release
        env:
          RUN_SYNTHESIS_SMOKE: "1"
        run: scripts/build-release --version "${GITHUB_REF_NAME#v}"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            .build/release-artifacts/Atten-macOS-arm64.dmg
            .build/release-artifacts/Atten-corresponding-source.tar.gz
            .build/release-artifacts/Atten-sbom.spdx.json
            .build/release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            .build/release-artifacts/Atten-macOS-arm64.dmg \
            .build/release-artifacts/Atten-corresponding-source.tar.gz \
            .build/release-artifacts/Atten-sbom.spdx.json \
            .build/release-artifacts/SHA256SUMS.txt \
            --verify-tag \
            --title "Atten ${GITHUB_REF_NAME#v}" \
            --notes-file packaging/RELEASE_NOTES.md

